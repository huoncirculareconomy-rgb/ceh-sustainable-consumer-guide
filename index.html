<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CEH Sustainable Consumer Guide</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

/*
=========================================================
Sustainable Consumer Guide

Purpose
Render filterable business cards from Google Sheet CSV

Features
• Single search box across all fields
• Search supports:
    multiple words (AND)
    OR operator
    "quoted phrases"
• Category & practice pill filters
• Clear search button
• Highlight matching search words
• Reset button clears filters and scrolls to top
• Rotating slogans
• Contact links
• Result count + last updated

Version: 1.6
Last Modified: 04-Mar-2026

Change Log
v1.5  simplified interface, removed dropdown filters
v1.6  UX improvements
      clear search button
      search term highlighting
      auto-scroll on search
      improved reset behaviour
=========================================================
*/

:root{
  --bg:#f6f3ef;
  --panel:#fbf8f4;
  --card:#f8f6f3;
  --border:#d9d9d9;
  --text:#24323f;
  --muted:#777;
  --title:#2e8b57;

  --blue-bg:#e6f0ff;
  --blue-bd:#bcd2ff;
  --blue-tx:#0b3ea9;

  --green-bg:#e7f6ea;
  --green-bd:#b9e2c2;
  --green-tx:#1a6b2f;

  --highlight:#fff3a0;

  --btn:#1f66d1;
  --btn-dark:#154ea3;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

.wrap{
max-width:1200px;
margin:auto;
padding:22px 18px 28px;
}

h1{
text-align:center;
color:var(--title);
}

.slogan{
text-align:center;
font-style:italic;
margin-bottom:20px;
}

.controls{
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
padding:14px;
}

.controls-row{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.search-box{
position:relative;
flex:1 1 500px;
}

.input{
width:100%;
height:42px;
padding:0 36px 0 12px;
border-radius:8px;
border:1px solid #7d7d7d;
font-size:14px;
}

.clear-btn{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-weight:bold;
color:#777;
}

.btn{
height:42px;
padding:0 14px;
border-radius:8px;
border:none;
background:var(--btn);
color:white;
font-weight:700;
cursor:pointer;
}

.btn:hover{
background:var(--btn-dark);
}

.meta{
text-align:center;
font-size:13px;
margin-top:8px;
color:var(--muted);
}

.grid{
margin-top:16px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

@media(max-width:900px){
.grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:600px){
.grid{grid-template-columns:1fr}
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:14px;
}

.name{
font-weight:600;
margin-bottom:8px;
}

.bullets{
margin-bottom:10px;
font-size:13px;
}

.pills{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:8px;
}

.pill{
font-size:12px;
padding:3px 9px;
border-radius:999px;
border:1px solid transparent;
cursor:pointer;
}

.pill.blue{
background:var(--blue-bg);
border-color:var(--blue-bd);
color:var(--blue-tx);
}

.pill.green{
background:var(--green-bg);
border-color:var(--green-bd);
color:var(--green-tx);
}

.pill.active{
box-shadow:0 0 0 1px #333;
font-weight:600;
}

mark{
background:var(--highlight);
padding:0 2px;
}

.contact{
border-top:1px solid var(--border);
margin-top:10px;
padding-top:10px;
font-size:12px;
color:var(--muted);
}

.contact a{
color:var(--blue-tx);
text-decoration:none;
}

.contact a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="wrap">

<h1>CEH Sustainable Consumer Guide</h1>
<div class="slogan" id="slogan"></div>

<div class="controls">

<div class="controls-row">

<div class="search-box">
<input id="search" class="input" placeholder="Search businesses, products, locations or practices…">
<div id="clearSearch" class="clear-btn">✕</div>
</div>

<button id="resetBtn" class="btn">Reset</button>

</div>

<div id="resultCount" class="meta"></div>

<div class="meta">
Search tips: use several words to narrow results, use <b>OR</b> between terms, or use "quotes" for exact phrases.
</div>

</div>

<div id="cards" class="grid"></div>

</div>

<script>

/* ---------------- DATA SOURCES ---------------- */

const DATA_CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vSuhA8ku2ftsdQaepAZucZWIHmVuwaLO2xq8_d8y5QIOBfCwRBDsWH9A5crAbsAcK3TFM1fcWMTVJjs/pub?gid=2076497318&single=true&output=csv"

const SLOGAN_CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vSuhA8ku2ftsdQaepAZucZWIHmVuwaLO2xq8_d8y5QIOBfCwRBDsWH9A5crAbsAcK3TFM1fcWMTVJjs/pub?gid=435440157&single=true&output=csv"


/* ---------------- GLOBAL STATE ---------------- */

let allData=[]
let filtered=[]
let activeCategory=null
let activePractice=null
let lastUpdated=""

/* ---------------- DOM ---------------- */

const search=document.getElementById("search")
const clearSearch=document.getElementById("clearSearch")
const resetBtn=document.getElementById("resetBtn")
const cards=document.getElementById("cards")
const resultCount=document.getElementById("resultCount")
const slogan=document.getElementById("slogan")


/* ---------------- UTILITIES ---------------- */
function highlight(text, query){

  if(!query) return text;

  // remove quotes and split words
  let words = query
    .replace(/"/g,"")
    .toLowerCase()
    .split(/\s+/)
    .filter(w => w && w !== "or");

  words.forEach(word => {

    const index = text.toLowerCase().indexOf(word);

    if(index !== -1){

      const before = text.substring(0,index);
      const match  = text.substring(index,index + word.length);
      const after  = text.substring(index + word.length);

      text = before + "<mark>" + match + "</mark>" + after;

    }

  });

  return text;

}


/* ---------------- SEARCH LOGIC ---------------- */
function matchSearch(record, query){

if(!query.trim()) return true

const text = JSON.stringify(record).toLowerCase()
const q = query.toLowerCase()

/* handle quoted phrases */
const phrases = [...q.matchAll(/"([^"]+)"/g)].map(m => m[1])
let remaining = q.replace(/"([^"]+)"/g," ").trim()

for(const p of phrases){
if(!text.includes(p)) return false
}

/* OR logic */
if(/\bor\b/.test(remaining)){

const parts = remaining.split(/\s+or\s+/)

return parts.some(part => {

const words = part.trim().split(/\s+/).filter(Boolean)

return words.every(w => text.includes(w))

})

}

/* default AND search */

const words = remaining.split(/\s+/).filter(Boolean)

return words.every(w => text.includes(w))

}



/* ---------------- CONTACT BLOCK ---------------- */

function buildContact(r){

const phone=r.Phone?.trim()
const email=r.Email?.trim()
const address=r.Address?.trim()
const website=r.Website?.trim()

if(!phone&&!email&&!address&&!website)return""

let html=`<div class="contact">`

if(website){
html+=`🌐 <a href="${website.startsWith("http")?website:"https://"+website}" target="_blank">${website}</a><br>`
}

if(phone){
html+=`☎ <a href="tel:${phone.replace(/\s+/g,"")}">${phone}</a><br>`
}

if(email){
html+=`✉ <a href="mailto:${email}">${email}</a><br>`
}

if(address){
html+=`📍 <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}" target="_blank">${address}</a>`
}

html+="</div>"

return html
}


/* ---------------- LOAD DATA ---------------- */

Papa.parse(DATA_CSV,{
download:true,
header:true,
complete:r=>{

allData=r.data.filter(x=>x.Name)

lastUpdated=new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}).replace(/ /g,"-")

applyFilters()

}
})


/* ---------------- SLOGANS ---------------- */

Papa.parse(SLOGAN_CSV,{
download:true,
header:false,
complete:r=>{

const rows=r.data.slice(3,16).filter(x=>x[0])

let i=0

function showNext(){

const[text,url,seconds]=rows[i]

slogan.innerHTML=url?`<a href="${url}" target="_blank">${text}</a>`:text

i=(i+1)%rows.length

setTimeout(showNext,(Number(seconds)||4)*1000)

}

if(rows.length)showNext()

}
})


/* ---------------- FILTERING ---------------- */

search.addEventListener("input",()=>{

applyFilters()

})

clearSearch.addEventListener("click",()=>{

search.value=""
applyFilters()

})

resetBtn.addEventListener("click",()=>{

search.value=""
activeCategory=null
activePractice=null

applyFilters()

window.scrollTo({top:0,behavior:"smooth"})

})


function togglePill(type,value){

if(type==="category"){
activeCategory=activeCategory===value?null:value
}else{
activePractice=activePractice===value?null:value
}

applyFilters()

}

window.togglePill=togglePill


function applyFilters(){

const q=search.value

filtered=allData.filter(r=>{

if(activeCategory&&!splitClean(r.Category).includes(activeCategory))return false
if(activePractice&&!splitClean(r.Practices).includes(activePractice))return false

return matchSearch(r,q)

})

render()

}


/* ---------------- RENDER ---------------- */

function render(){

const q=search.value

cards.innerHTML=filtered.map(r=>`

<div class="card">

<div class="name">${highlight(r.Name,q)}</div>

<div class="bullets">${highlight(r["Product/Service"]||"",q)}</div>

<div class="pills">
${splitClean(r.Category).map(c=>`
<button class="pill blue ${activeCategory===c?"active":""}" onclick="togglePill('category','${c}')">${c}</button>
`).join("")}
</div>

<div class="pills">
${splitClean(r.Practices).map(p=>`
<button class="pill green ${activePractice===p?"active":""}" onclick="togglePill('practice','${p}')">${p}</button>
`).join("")}
</div>

${buildContact(r)}

</div>

`).join("")

resultCount.textContent=`Showing ${filtered.length} of ${allData.length} results, last updated ${lastUpdated}`

}

</script>

</body>
</html>
