<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEH Sustainable Consumer Guide</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>

:root{
  --bg:#f6f3ef;
  --panel:#fbf8f4;
  --card:#fffdf9;
  --border:#d9d9d9;
  --text:#24323f;
  --muted:#777;
  --title:#2e8b57;

  --green-bg:#e7f6ea;
  --green-bd:#b9e2c2;
  --green-tx:#1a6b2f;

  --highlight:#fff3a0;

  --btn:#1f66d1;
  --btn-dark:#154ea3;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ── Loading overlay ── */
#loader{
  position:fixed;
  inset:0;
  z-index:999;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  transition:opacity 0.4s ease, visibility 0.4s ease;
}

#loader.hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.loader-leaf{
  width:48px;
  height:48px;
  position:relative;
  animation:spin 1.2s linear infinite;
}

.loader-leaf svg{
  width:100%;
  height:100%;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.loader-dots{
  display:flex;
  gap:6px;
}

.loader-dots span{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--title);
  animation:bounce 1.2s ease-in-out infinite;
}

.loader-dots span:nth-child(2){animation-delay:0.2s}
.loader-dots span:nth-child(3){animation-delay:0.4s}

@keyframes bounce{
  0%,80%,100%{transform:translateY(0);opacity:0.4}
  40%{transform:translateY(-10px);opacity:1}
}

.loader-text{
  font-size:14px;
  color:var(--muted);
  letter-spacing:0.03em;
}

/* ── Error banner ── */
#errorBanner{
  display:none;
  background:#fff0f0;
  border:1px solid #f5c2c2;
  color:#8b1a1a;
  border-radius:10px;
  padding:14px 18px;
  margin-bottom:16px;
  font-size:14px;
  text-align:center;
}

/* ── Main content (hidden until loaded) ── */
#mainContent{
  opacity:0;
  transition:opacity 0.4s ease;
}

#mainContent.visible{
  opacity:1;
}

/* ── Skeleton cards ── */
.skeleton-grid{
  margin-top:16px;
  columns:3 300px;
  column-gap:16px;
}

.skeleton-card{
  break-inside:avoid;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
}

.skel{
  background:linear-gradient(90deg,#e8e4de 25%,#f0ece6 50%,#e8e4de 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;
}

@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

.skel-title{height:16px;width:60%;margin-bottom:12px}
.skel-line{height:11px;margin-bottom:7px}
.skel-line.w80{width:80%}
.skel-line.w65{width:65%}
.skel-line.w90{width:90%}
.skel-pills{display:flex;gap:6px;margin-top:10px}
.skel-pill{height:22px;width:64px;border-radius:999px}

/* ── App styles ── */
.wrap{
  max-width:1200px;
  margin:auto;
  padding:22px 18px 28px;
}

h1{text-align:center;color:var(--title)}

.slogan{text-align:center;font-style:italic;margin-bottom:20px}

.controls{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
}

.controls-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.search-box{position:relative;flex:1 1 500px}

.input{
  width:100%;
  height:42px;
  padding:0 36px 0 12px;
  border-radius:8px;
  border:1px solid #7d7d7d;
  font-size:14px;
}

.clear-btn{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-weight:bold;
  color:#777;
}

.btn{
  height:42px;
  padding:0 14px;
  border-radius:8px;
  border:none;
  background:var(--btn);
  color:white;
  font-weight:700;
  cursor:pointer;
}

.btn:hover{background:var(--btn-dark)}

.meta{text-align:center;font-size:13px;margin-top:8px;color:var(--muted)}

.grid{margin-top:16px;columns:3 300px;column-gap:16px}

.card{
  break-inside:avoid;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
}

.name{font-weight:600;margin-bottom:8px}

.bullets{display:grid;gap:6px;margin-bottom:10px;font-size:13px}

.bullet{display:grid;grid-template-columns:12px 1fr;gap:6px}

.chev{font-weight:700}

.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}

.pill{
  font-size:12px;
  padding:3px 9px;
  border-radius:999px;
  border:1px solid transparent;
  cursor:pointer;
  background:var(--green-bg);
  border-color:var(--green-bd);
  color:var(--green-tx);
}

.pill.active{box-shadow:0 0 0 1px #333;font-weight:600}

mark{background:var(--highlight);padding:0 2px}

.notes{
  font-size:12px;
  font-style:italic;
  color:var(--muted);
  margin-bottom:8px;
}

.contact{
  border-top:1px solid var(--border);
  margin-top:10px;
  padding-top:10px;
  font-size:12px;
  color:var(--muted);
}

.contact a{color:#0b3ea9;text-decoration:none}
.contact a:hover{text-decoration:underline}

</style>
</head>
<body>

<!-- ── Loading overlay ── -->
<div id="loader">
  <div class="loader-leaf">
    <!-- Leaf SVG spinner -->
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 4C24 4 8 12 8 28C8 37.941 15.163 46 24 46C32.837 46 40 37.941 40 28C40 12 24 4 24 4Z"
            fill="#2e8b57" opacity="0.15"/>
      <path d="M24 4C24 4 8 12 8 28C8 37.941 15.163 46 24 46"
            stroke="#2e8b57" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M24 46V18" stroke="#2e8b57" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    </svg>
  </div>
  <div class="loader-dots">
    <span></span><span></span><span></span>
  </div>
  <div class="loader-text">Loading sustainable businesses…</div>
</div>

<!-- ── Main content ── -->
<div id="mainContent">
  <div class="wrap">

    <h1>CEH Sustainable Consumer Guide</h1>
    <div class="slogan" id="slogan"></div>

    <div id="errorBanner"></div>

    <div class="controls">
      <div class="controls-row">
        <div class="search-box">
          <input id="search" class="input" placeholder="Search businesses, products, locations or practices…">
          <div id="clearSearch" class="clear-btn">✕</div>
        </div>
        <button id="resetBtn" class="btn">Reset</button>
      </div>
      <div id="resultCount" class="meta"></div>
      <div class="meta">
        Search tips: use several words to narrow results, use <b>OR</b> between terms, or use "quotes" for exact phrases.
      </div>
    </div>

    <div id="cards" class="grid"></div>

  </div>
</div>

<script>

const DATA_CSV   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuhA8ku2ftsdQaepAZucZWIHmVuwaLO2xq8_d8y5QIOBfCwRBDsWH9A5crAbsAcK3TFM1fcWMTVJjs/pub?gid=2076497318&single=true&output=csv"
const SLOGAN_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuhA8ku2ftsdQaepAZucZWIHmVuwaLO2xq8_d8y5QIOBfCwRBDsWH9A5crAbsAcK3TFM1fcWMTVJjs/pub?gid=435440157&single=true&output=csv"

let allData = []
let filtered = []
let activeFilter = null
let lastUpdated = ""

const loader      = document.getElementById("loader")
const mainContent = document.getElementById("mainContent")
const errorBanner = document.getElementById("errorBanner")
const search      = document.getElementById("search")
const clearSearch = document.getElementById("clearSearch")
const resetBtn    = document.getElementById("resetBtn")
const cards       = document.getElementById("cards")
const resultCount = document.getElementById("resultCount")
const slogan      = document.getElementById("slogan")

// ── Loading helpers ──────────────────────────────────────────────────────────

function showApp() {
  loader.classList.add("hidden")
  mainContent.classList.add("visible")
}

function showError(msg) {
  loader.classList.add("hidden")
  mainContent.classList.add("visible")
  errorBanner.style.display = "block"
  errorBanner.textContent = msg
}

// ── Utility ──────────────────────────────────────────────────────────────────

const splitClean = v => v ? v.split(",").map(x => x.trim()).filter(Boolean) : []
const toTitleCase = s => s.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())

function combinedTags(r) {
  const all = [...splitClean(r.Category), ...splitClean(r.Practices)]
  const seen = new Set()
  return all.map(toTitleCase).filter(t => {
    if (seen.has(t)) return false
    seen.add(t)
    return true
  })
}

function highlight(text, q) { return text }

function bulletise(text, q) {
  if (!text) return ""
  return text.split(".")
    .map(t => t.trim())
    .filter(Boolean)
    .map(t => `
      <div class="bullet">
        <div class="chev">&gt;</div>
        <div>${highlight(t + ".", q)}</div>
      </div>
    `).join("")
}

function matchSearch(record, query) {
  if (!query.trim()) return true
  const text = JSON.stringify(record).toLowerCase()
  const q = query.toLowerCase()
  const phrases = [...q.matchAll(/"([^"]+)"/g)].map(m => m[1])
  let remaining = q.replace(/"([^"]+)"/g, "").trim()
  for (const p of phrases) { if (!text.includes(p)) return false }
  const orGroups = remaining.split(/\s+or\s+/)
  if (orGroups.length > 1) return orGroups.some(term => text.includes(term.trim()))
  const words = remaining.split(/\s+/).filter(Boolean)
  return words.every(w => text.includes(w))
}

function buildContact(r) {
  const phone   = r.Phone?.trim()
  const email   = r.Email?.trim()
  const address = r.Address?.trim()
  const website = r.Website?.trim()
  if (!phone && !email && !address && !website) return ""
  let html = `<div class="contact">`
  if (website) {
    const urls = website.split(/[\n,]|\s+or\s+|\s+(?=https?:\/\/|\bwww\.)/i)
      .map(u => u.trim())
      .filter(u => u && /^(https?:\/\/|www\.)/i.test(u))
    urls.forEach(u => {
      html += `🌐 <a href="${u.startsWith("http") ? u : "https://" + u}" target="_blank">${u}</a><br>`
    })
  }
  if (phone)   html += `☎ <a href="tel:${phone.replace(/\s+/g, "")}">${phone}</a><br>`
  if (email)   html += `✉ <a href="mailto:${email}">${email}</a><br>`
  if (address) html += `📍 <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}" target="_blank">${address}</a>`
  html += "</div>"
  return html
}

// ── Data fetching ─────────────────────────────────────────────────────────────

Papa.parse(DATA_CSV, {
  download: true,
  header: true,
  complete: r => {
    allData = r.data.filter(x => x.Name)
    if (allData.length === 0) {
      showError("No data could be loaded. Please check your connection and try refreshing.")
      return
    }
    allData.sort(() => Math.random() - 0.5)
    lastUpdated = new Date().toLocaleDateString("en-GB", {
      day: "2-digit", month: "short", year: "numeric"
    }).replace(/ /g, "-")
    applyFilters()
    showApp()
  },
  error: () => {
    showError("Failed to load business data. Please check your connection and try refreshing.")
  }
})

Papa.parse(SLOGAN_CSV, {
  download: true,
  header: false,
  complete: r => {
    const rows = r.data.slice(3, 16).filter(x => x[0])
    let i = 0
    function showNext() {
      const [text, url, seconds] = rows[i]
      slogan.innerHTML = url ? `<a href="${url}" target="_blank">${text}</a>` : text
      i = (i + 1) % rows.length
      setTimeout(showNext, (Number(seconds) || 4) * 1000)
    }
    if (rows.length) showNext()
  }
})

// ── Filters & render ──────────────────────────────────────────────────────────

search.addEventListener("input", applyFilters)

clearSearch.addEventListener("click", () => {
  search.value = ""
  applyFilters()
})

resetBtn.addEventListener("click", () => {
  search.value = ""
  activeFilter = null
  applyFilters()
  window.scrollTo({ top: 0, behavior: "smooth" })
})

function togglePill(value) {
  activeFilter = activeFilter === value ? null : value
  applyFilters()
}
window.togglePill = togglePill

function applyFilters() {
  const q = search.value
  filtered = allData.filter(r => {
    if (activeFilter) {
      const tags = combinedTags(r)
      if (!tags.includes(activeFilter)) return false
    }
    return matchSearch(r, q)
  })
  render()
}

function render() {
  const q = search.value
  cards.innerHTML = filtered.map(r => {
    const tags = combinedTags(r)
    return `
      <div class="card">
        <div class="name">${highlight(r.Name, q)}</div>
        <div class="bullets">${bulletise(r["Product/Service"], q)}</div>
        <div class="pills">
          ${tags.map(t => `
            <button class="pill ${activeFilter === t ? "active" : ""}" onclick="togglePill('${t.replace(/'/g, "\\'")}')"> ${t}</button>
          `).join("")}
        </div>
        ${r.Notes ? `<div class="notes">${r.Notes}</div>` : ""}
        ${buildContact(r)}
      </div>
    `
  }).join("")
  resultCount.textContent = `Showing ${filtered.length} of ${allData.length} results, last updated ${lastUpdated}`
}

</script>
</body>
</html>
